name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:          # cho phép bấm Run thủ công trên GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node.js ──────────────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── 3. Java (Gradle cần JDK 17) ────────────────────────
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── 4. Install npm deps ─────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 5. Build React app ──────────────────────────────────
      - name: Build React (npm run build)
        run: npm run build

      # ── 6. Stash custom Android files ──────────────────────
      #     (npx cap add android sẽ fail nếu android/ đã tồn tại)
      - name: Stash custom Android source files
        run: |
          mkdir -p /tmp/android-custom/java /tmp/android-custom/res
          # Custom Java files (plugins + services)
          cp android/app/src/main/java/com/aria/assistant/*.java /tmp/android-custom/java/
          # Custom resources (drawables, layouts, xml, values)
          cp -r android/app/src/main/res/* /tmp/android-custom/res/
          # Our complete AndroidManifest.xml
          cp android/app/src/main/AndroidManifest.xml /tmp/android-custom/AndroidManifest.xml
          # Remove android/ so Capacitor can create it fresh
          rm -rf android

      # ── 7. Add Capacitor Android platform ──────────────────
      - name: npx cap add android
        run: npx cap add android

      # ── 8. Restore custom files ─────────────────────────────
      - name: Restore custom Java + resources
        run: |
          DEST=android/app/src/main/java/com/aria/assistant
          # Copy all custom Java files EXCEPT MainActivity (Capacitor owns it)
          for f in /tmp/android-custom/java/*.java; do
            name=$(basename "$f")
            if [ "$name" != "MainActivity.java" ]; then
              cp "$f" "$DEST/"
            fi
          done
          # Merge resources (do not overwrite Capacitor's existing res files)
          cp -rn /tmp/android-custom/res/. android/app/src/main/res/

      # ── 9. Patch MainActivity.java ──────────────────────────
      - name: Patch MainActivity.java (register plugins)
        run: python3 scripts/patch_mainactivity.py

      # ── 10. Replace AndroidManifest.xml ────────────────────
      - name: Replace AndroidManifest.xml
        run: cp /tmp/android-custom/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      # ── 11. Sync Capacitor ──────────────────────────────────
      - name: npx cap sync android
        run: npx cap sync android

      # ── 12. Build debug APK ─────────────────────────────────
      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      # ── 13. Upload artifact ─────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mei-ai-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      # ── 14. (Optional) Create GitHub Release ────────────────
      - name: Create Release on tag push
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: "Mei AI ${{ github.ref_name }}"
          body: "APK debug build tự động từ GitHub Actions"
